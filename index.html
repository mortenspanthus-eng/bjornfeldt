<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bjornfeldt</title>
<style>
body{
    margin:0;
    background:#050b16;
    color:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
    background-image: radial-gradient(circle at top, rgba(24,47,88,0.35), transparent 50%);
}
.container{
    max-width:1100px;
    margin:auto;
    padding:40px 24px;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}
.logo{
    display:flex;
    align-items:center;
    gap:14px;
    color:#d6b35a;
    font-size:22px;
    letter-spacing:2px;
}
.logo img{
    width:42px;
    height:42px;
    border-radius:8px;
}
.links{
    display:flex;
    gap:28px;
}
.links a{
    color:#d6d6d6;
    text-decoration:none;
}
.hero{
    text-align:center;
    padding:40px 0 80px;
}
.hero img{
    width:340px;
    max-width:90%;
    margin-bottom:40px;
}
.small{
    color:#d6b35a;
    letter-spacing:3px;
    font-size:12px;
    margin-bottom:18px;
}
h1{
    font-size:82px;
    line-height:0.95;
    margin:0 auto 26px;
    max-width:850px;
}
.sub{
    color:#b7bcc7;
    max-width:700px;
    margin:0 auto;
    font-size:24px;
    line-height:1.6;
}
.buttons{
    margin-top:42px;
    display:flex;
    justify-content:center;
    gap:16px;
}
.btn{
    padding:16px 28px;
    border-radius:999px;
    text-decoration:none;
    font-weight:bold;
}
.primary{
    background:#d6b35a;
    color:#08111f;
}
.secondary{
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}
@media(max-width:768px){
    h1{
        font-size:52px;
    }
    .sub{
        font-size:18px;
    }
}
</style>
</head>
<body>
<div class="container">
<nav>
<div class="logo">
<img src="assets/bjornfeldt-logo.png" alt="logo">
<span>bjornfeldt</span>
</div>

<div class="links">
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<img src="assets/bjornfeldt-logo.png" alt="bjornfeldt logo">

<div class="small">MODERN APP DEVELOPMENT STUDIO</div>

<h1>Building digital products</h1>

<p class="sub">
Apps and software built with a focus on usability and design.
</p>

<div class="buttons">
<a class="btn primary" href="#">View projects</a>
<a class="btn secondary" href="#">Contact</a>
</div>
</section>
</div>
</body>
</html>
